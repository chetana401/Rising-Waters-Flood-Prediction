<!DOCTYPE html>
<html>
<head>
    <title>Rising Waters - Flood Prediction</title>

    <style>
        body {
            font-family: Arial;
            background: #e6f2ff;
            text-align: center;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 30px;
            width: 450px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #aaa;
        }

        h1 {
            color: #0066cc;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 5px;
        }

        button {
            background: #0066cc;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
            width: 95%;
            margin-top: 10px;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🌊 Rising Waters</h1>
    <p>Flood Prediction System</p>

    <form action="/predict" method="post">

        <input name="f1" placeholder="Temp">
        <input name="f2" placeholder="Humidity">
        <input name="f3" placeholder="Cloud Cover">
        <input name="f4" placeholder="ANNUAL">
        <input name="f5" placeholder="Jan-Feb">
        <input name="f6" placeholder="Mar-May">
        <input name="f7" placeholder="Jun-Sep">
        <input name="f8" placeholder="Oct-Dec">
        <input name="f9" placeholder="avgjune">
        <input name="f10" placeholder="sub">

        <button type="submit">Predict</button>
    </form>

    {% if prediction_text %}
        <div class="result">
            {{ prediction_text }}
        </div>
    {% endif %}

</div>

</body>
</html>
